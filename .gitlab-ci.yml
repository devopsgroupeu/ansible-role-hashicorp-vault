---
# GitLab CI/CD Pipeline for ansible-role-hashicorp-vault

stages:
  - lint
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  ANSIBLE_FORCE_COLOR: "1"
  PY_COLORS: "1"

cache:
  paths:
    - .cache/pip
    - venv/

# ---- Lint Stage ---------------------------------------------------------------

yamllint:
  stage: lint
  image: python:3.12-slim
  cache: []
  before_script:
    - pip install yamllint
  script:
    - yamllint defaults/ handlers/ tasks/ templates/ molecule/ meta/ examples/ docs/ .yamllint .gitlab-ci.yml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.*/'

ansible-lint:
  stage: lint
  image: python:3.12-slim
  cache: []
  before_script:
    - pip install ansible-lint
  script:
    - ansible-lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.*/'

# ---- Test Stage ---------------------------------------------------------------

.molecule_test:
  stage: test
  image: python:3.12
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update -qq && apt-get install -y -qq docker.io
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.*/'

molecule:render:
  extends: .molecule_test
  script:
    - source venv/bin/activate
    - molecule test -s render
  variables:
    MOLECULE_DISTRO: debian12

molecule:default:debian12:
  extends: .molecule_test
  script:
    - source venv/bin/activate
    - molecule test -s default
  variables:
    MOLECULE_DISTRO: debian12

molecule:default:ubuntu2404:
  extends: .molecule_test
  script:
    - source venv/bin/activate
    - molecule test -s default
  variables:
    MOLECULE_DISTRO: ubuntu2404

molecule:default:debian13:
  extends: .molecule_test
  script:
    - source venv/bin/activate
    - molecule test -s default
  variables:
    MOLECULE_DISTRO: debian13

molecule:default:rockylinux9:
  extends: .molecule_test
  script:
    - source venv/bin/activate
    - molecule test -s default
  variables:
    MOLECULE_DISTRO: rockylinux9

