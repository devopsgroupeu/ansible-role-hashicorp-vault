---
# Single-node Vault deployment — dev/test with role-generated self-signed TLS.
#
# Inventory (examples/inventory/vault_cluster.yml or equivalent):
#   all:
#     children:
#       vault:
#         hosts:
#           vault-dev:
#             ansible_host: 192.0.2.10
#
# Usage:
#   ansible-playbook -i examples/inventory/vault_cluster.yml examples/single_node.yml
#
# After the run the init file is at:
#   {{ playbook_dir }}/.vault_init_vault-dev.json
# Encrypt it immediately:
#   ansible-vault encrypt .vault_init_vault-dev.json

- name: Deploy single-node HashiCorp Vault
  hosts: vault
  become: true
  gather_facts: true
  roles:
    - role: devopsgroupeu.hashicorp-vault
      vars:
        # ---- TLS ----------------------------------------------------------------
        # Role generates a self-signed CA + cert; convenient for dev/test.
        # In production set vault_tls_generate_certs: false and supply BYO certs.
        vault_tls_generate_certs: true

        # ---- Init / unseal (simplified for single-node dev) --------------------
        vault_init_key_shares: 1
        vault_init_key_threshold: 1
        # Set the path to an ansible-vault password file to encrypt the init output.
        vault_init_encrypt_output: false

        # ---- Logging -----------------------------------------------------------
        vault_log_level: "info"
        vault_log_format: "json"

        # ---- UI ----------------------------------------------------------------
        vault_ui: true
