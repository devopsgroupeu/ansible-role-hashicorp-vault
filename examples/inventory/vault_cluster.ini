# Example inventory for a 3-node Vault Raft HA cluster.
#
# The group name 'vault' is the convention consumed by this role.
# vault_raft_peers defaults to groups['vault'] — the role builds retry_join
# blocks from this group so every node knows all its peers.
#
# Set vault_api_addr and vault_cluster_addr per-host (host_vars or inline)
# so each node advertises its own IP/hostname to the cluster.
# Default: https://{{ ansible_default_ipv4.address }}:8200 / :8201
#
# Usage:
#   ansible-playbook -i inventory/vault_cluster.ini site.yml

[vault]
vault1 ansible_host=10.0.1.11 vault_api_addr=https://10.0.1.11:8200 vault_cluster_addr=https://10.0.1.11:8201
vault2 ansible_host=10.0.1.12 vault_api_addr=https://10.0.1.12:8200 vault_cluster_addr=https://10.0.1.12:8201
vault3 ansible_host=10.0.1.13 vault_api_addr=https://10.0.1.13:8200 vault_cluster_addr=https://10.0.1.13:8201

[vault:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
vault_raft_performance_multiplier=1
vault_tls_leader_servername=vault.cluster.internal
