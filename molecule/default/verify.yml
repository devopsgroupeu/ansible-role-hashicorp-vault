---
# Verify the default scenario: Vault is initialized, unsealed, Raft formed,
# audit device enabled, and the service is running and enabled.

- name: Verify Vault full init+unseal state
  hosts: all
  become: true
  gather_facts: true
  vars:
    __verify_vault_tls_ca: "/opt/vault/tls/vault-ca.pem"
    __verify_vault_audit_log: "/opt/vault/audit/vault_audit.log"
    __verify_init_output_path: "/tmp/.vault_init_molecule_default.json"
  tasks:
    # --- Service checks -------------------------------------------------------

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert vault.service is running and enabled
      ansible.builtin.assert:
        that:
          - ansible_facts['services']['vault.service'] is defined
          - ansible_facts['services']['vault.service']['state'] == 'running'
          - ansible_facts['services']['vault.service']['status'] == 'enabled'
        fail_msg: "vault.service is not running or not enabled"
        success_msg: "vault.service is running and enabled"

    # --- Config file checks ---------------------------------------------------

    - name: Stat vault.hcl
      ansible.builtin.stat:
        path: /etc/vault.d/vault.hcl
      register: __verify_vault_hcl

    - name: Assert vault.hcl exists
      ansible.builtin.assert:
        that: __verify_vault_hcl['stat']['exists']
        fail_msg: "/etc/vault.d/vault.hcl not found"
        success_msg: "/etc/vault.d/vault.hcl exists"

    # --- Vault status: initialized + unsealed + raft --------------------------

    - name: Wait for Vault TLS listener to become ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8200
        timeout: 30
        state: started

    - name: Query Vault status (expect initialized+unsealed, rc=0)
      ansible.builtin.command: >-
        vault status -format=json
      environment:
        VAULT_ADDR: "https://127.0.0.1:8200"
        VAULT_CACERT: "{{ __verify_vault_tls_ca }}"
      register: __verify_vault_status_cmd
      changed_when: false
      failed_when: __verify_vault_status_cmd['rc'] not in [0, 2]
      retries: 6
      delay: 5
      until: __verify_vault_status_cmd['rc'] == 0

    - name: Parse Vault status JSON
      ansible.builtin.set_fact:
        __verify_vault_status: "{{ __verify_vault_status_cmd['stdout'] | from_json }}"

    - name: Assert Vault is initialized
      ansible.builtin.assert:
        that:
          - __verify_vault_status['initialized'] | bool
        fail_msg: "Vault is not initialized"
        success_msg: "Vault is initialized"

    - name: Assert Vault is unsealed
      ansible.builtin.assert:
        that:
          - not (__verify_vault_status['sealed'] | bool)
        fail_msg: "Vault is sealed"
        success_msg: "Vault is unsealed"

    - name: Assert storage type is raft
      ansible.builtin.assert:
        that:
          - __verify_vault_status['storage_type'] == 'raft'
        fail_msg: >-
          Expected storage_type 'raft' but got
          '{{ __verify_vault_status['storage_type'] }}'
        success_msg: "Vault storage type is raft"

    # --- Raft peer check ------------------------------------------------------

    - name: Read root token from controller init file
      ansible.builtin.slurp:
        src: "{{ __verify_init_output_path }}"
      delegate_to: localhost
      become: false
      register: __verify_init_file_raw
      no_log: true

    - name: Parse init file and extract root token
      ansible.builtin.set_fact:
        __verify_root_token: "{{ (__verify_init_file_raw['content'] | b64decode | from_json)['root_token'] }}"
      no_log: true

    - name: Query Raft peer list
      ansible.builtin.command: >-
        vault operator raft list-peers -format=json
      environment:
        VAULT_ADDR: "https://127.0.0.1:8200"
        VAULT_CACERT: "{{ __verify_vault_tls_ca }}"
        VAULT_TOKEN: "{{ __verify_root_token }}"
      register: __verify_raft_peers_cmd
      changed_when: false
      failed_when: __verify_raft_peers_cmd['rc'] != 0
      no_log: true

    - name: Parse Raft peers JSON
      ansible.builtin.set_fact:
        __verify_raft_peers: "{{ (__verify_raft_peers_cmd['stdout'] | from_json)['data']['config']['servers'] }}"

    - name: Assert Raft peer count is 1 (single-node scenario)
      ansible.builtin.assert:
        that:
          - __verify_raft_peers | length == 1
        fail_msg: >-
          Expected 1 Raft peer but found {{ __verify_raft_peers | length }}
        success_msg: "Raft peer count is 1"

    - name: Assert all Raft peers are voters
      ansible.builtin.assert:
        that:
          - __verify_raft_peers | selectattr('voter', 'equalto', true) | list | length == 1
        fail_msg: "Not all Raft peers are voters"
        success_msg: "All Raft peers are voters"

    # --- Audit device check ---------------------------------------------------

    - name: Stat audit log file
      ansible.builtin.stat:
        path: "{{ __verify_vault_audit_log }}"
      register: __verify_audit_log_stat

    - name: Assert audit log file exists
      ansible.builtin.assert:
        that: __verify_audit_log_stat['stat']['exists']
        fail_msg: "Vault audit log {{ __verify_vault_audit_log }} not found"
        success_msg: "Vault audit log exists"

    # --- Vault binary sanity check -------------------------------------------

    - name: Assert Vault binary returns version string
      ansible.builtin.command: vault version
      register: __verify_vault_version
      changed_when: false

    - name: Assert version output contains 'Vault'
      ansible.builtin.assert:
        that:
          - "'Vault' in __verify_vault_version['stdout']"
        fail_msg: "Vault binary not working or missing version output"
        success_msg: "Vault binary is functional"
