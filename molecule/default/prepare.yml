---
# Prepare the container before the role runs.
# Install Python and gather facts; no Vault-specific setup here — the role
# installs Vault itself via the package method.

- name: Prepare default container
  hosts: all
  gather_facts: false
  tasks:
    - name: Detect available package manager
      ansible.builtin.raw: command -v apt-get >/dev/null 2>&1 && echo apt || echo dnf
      register: _pkg_mgr
      changed_when: false

    - name: Bootstrap Python (Debian/Ubuntu)
      ansible.builtin.raw: >-
        apt-get update -qq &&
        apt-get install -y -qq --no-install-recommends python3 python3-apt
      changed_when: true
      when: "'apt' in _pkg_mgr.stdout"

    - name: Bootstrap Python (RHEL/Rocky)
      ansible.builtin.raw: >-
        dnf install -y python3
      changed_when: true
      when: "'dnf' in _pkg_mgr.stdout"

    - name: Gather facts after bootstrap
      ansible.builtin.setup:
