---
# Converge for the default scenario.
# Installs Vault via package, generates TLS, configures and starts the service.
# Phase 4: full init + unseal + audit enabled.

- name: Converge
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Phase 4: full init+unseal enabled.
    vault_init: true
    vault_unseal: true
    vault_audit_enabled: true

    # Single share/threshold for a single-node scenario.
    vault_init_key_shares: 1
    vault_init_key_threshold: 1

    # Do not encrypt the init output — ansible-vault is not available
    # unattended in the Molecule environment without a vault password file.
    vault_init_encrypt_output: false

    # Write the init file to /tmp so it stays ephemeral and is never committed.
    vault_init_output_path: "/tmp/.vault_init_molecule_default.json"

    # mlock cannot be used inside plain Docker containers.
    vault_disable_mlock: true

    # Swap is not configured in containers; suppress swapoff entirely.
    vault_manage_swap: false

    # Generate TLS certs via community.crypto so no pre-placed certs are needed.
    vault_tls_generate_certs: true

    # Shared leader servername SAN (must match retry_join blocks).
    vault_tls_leader_servername: "vault.cluster.internal"

    # Use loopback for api_addr / cluster_addr in the single-node container.
    vault_api_addr: "https://127.0.0.1:8200"
    vault_cluster_addr: "https://127.0.0.1:8201"

    # Single-node cluster.
    vault_raft_peers:
      - vault-default

    # Keep telemetry enabled (default).
    vault_telemetry_enabled: true

    # Do not install CA into trust store in this ephemeral container.
    vault_tls_install_ca_to_trust_store: false

  tasks:
    - name: Include hashicorp_vault role
      ansible.builtin.include_role:
        name: ansible-role-hashicorp-vault
