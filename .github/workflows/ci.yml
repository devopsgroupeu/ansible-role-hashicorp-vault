---
name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_raft_ha:
        description: "Run raft-ha scenario (heavy — 3-node cluster)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: yamllint
        run: yamllint .
      - name: ansible-lint
        run: ansible-lint --profile production .

  molecule:
    name: molecule / ${{ matrix.scenario }} / ${{ matrix.distro }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      # CI tests the container-reliable matrix (Debian + Ubuntu). EL9 is a
      # supported platform validated on real hosts — RockyLinux containers have
      # known sudo/PAM quirks. The heavy raft-ha scenario is workflow_dispatch.
      matrix:
        include:
          # render scenario — offline template validation
          - scenario: render
            distro: debian12
          - scenario: render
            distro: ubuntu2404
          # default scenario — full install + init + unseal + audit
          - scenario: default
            distro: debian12
          - scenario: default
            distro: ubuntu2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Molecule scenario
        run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}

  molecule-raft-ha:
    # Heavy 3-node HA scenario — triggered manually via workflow_dispatch only.
    # Requires Docker with adequate resources to run 3 systemd containers concurrently.
    name: molecule / raft-ha
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_raft_ha == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run raft-ha Molecule scenario
        run: molecule test -s raft-ha
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: debian12

  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: [lint, molecule]
    if: always()
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job (lint or molecule) did not succeed."
          exit 1
      - name: Confirm required jobs passed
        run: echo "lint + molecule succeeded"
