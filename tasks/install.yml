---
# Dispatches to the appropriate install task file based on vault_install_method.

- name: Install Vault via package manager
  ansible.builtin.include_tasks: install_package.yml
  when: vault_install_method == 'package'

- name: Install Vault via binary download
  ansible.builtin.include_tasks: install_binary.yml
  when: vault_install_method == 'binary'
