---
# ==============================================================================
# Install Vault from a GPG-verified binary zip (air-gapped / version-pinned)
# ==============================================================================

# Build the canonical download filename once so all tasks below stay DRY.
- name: Set binary download facts
  ansible.builtin.set_fact:
    __vault_zip_name: "vault_{{ vault_version }}_linux_{{ vault_arch }}.zip"
    __vault_tmpdir: "/tmp/vault-install-{{ vault_version }}"
  tags: install

- name: Create temporary download directory
  ansible.builtin.file:
    path: "{{ __vault_tmpdir }}"
    state: directory
    mode: "0700"
  tags: install

# Fetch the three artefacts in sequence; get_url is idempotent (checksum guard).
- name: Download Vault binary zip
  ansible.builtin.get_url:
    url: "{{ vault_binary_base_url }}/{{ vault_version }}/{{ __vault_zip_name }}"
    dest: "{{ __vault_tmpdir }}/{{ __vault_zip_name }}"
    mode: "0600"
    force: false
  tags: install

- name: Download Vault SHA256SUMS
  ansible.builtin.get_url:
    url: "{{ vault_binary_base_url }}/{{ vault_version }}/vault_{{ vault_version }}_SHA256SUMS"
    dest: "{{ __vault_tmpdir }}/vault_{{ vault_version }}_SHA256SUMS"
    mode: "0600"
    force: false
  tags: install

- name: Download Vault SHA256SUMS.sig
  ansible.builtin.get_url:
    url: "{{ vault_binary_base_url }}/{{ vault_version }}/vault_{{ vault_version }}_SHA256SUMS.sig"
    dest: "{{ __vault_tmpdir }}/vault_{{ vault_version }}_SHA256SUMS.sig"
    mode: "0600"
    force: false
  when: vault_binary_verify_gpg | bool
  tags: install

- name: Download HashiCorp PGP public key
  ansible.builtin.get_url:
    url: "{{ vault_binary_gpg_key_url }}"
    dest: "{{ __vault_tmpdir }}/hashicorp.pgp"
    mode: "0600"
    force: false
  when: vault_binary_verify_gpg | bool
  tags: install

- name: Import HashiCorp PGP key into ephemeral keyring
  ansible.builtin.command: >-
    gpg --batch --no-default-keyring
    --keyring {{ __vault_tmpdir }}/hashicorp.gpg
    --import {{ __vault_tmpdir }}/hashicorp.pgp
  changed_when: false
  when: vault_binary_verify_gpg | bool
  tags: install

- name: Verify SHA256SUMS signature
  ansible.builtin.command: >-
    gpg --batch --no-default-keyring
    --keyring {{ __vault_tmpdir }}/hashicorp.gpg
    --verify {{ __vault_tmpdir }}/vault_{{ vault_version }}_SHA256SUMS.sig
    {{ __vault_tmpdir }}/vault_{{ vault_version }}_SHA256SUMS
  changed_when: false
  when: vault_binary_verify_gpg | bool
  tags: install

# Verify the zip checksum against the signed SHA256SUMS file.
# SHA256SUMS lists every platform's zip, but only this architecture's zip was
# downloaded. We therefore (a) assert the downloaded zip is present so a missing
# zip fails closed, then (b) run sha256sum with --ignore-missing so the verify
# checks our present file while skipping the absent other-platform entries.
- name: Stat downloaded Vault zip before checksum verification
  ansible.builtin.stat:
    path: "{{ __vault_tmpdir }}/{{ __vault_zip_name }}"
  register: __vault_zip_stat
  tags: install

- name: Assert downloaded Vault zip exists
  ansible.builtin.assert:
    that:
      - __vault_zip_stat['stat']['exists'] | bool
    fail_msg: >-
      Downloaded Vault zip {{ __vault_zip_name }} is missing from
      {{ __vault_tmpdir }}; cannot verify checksum.
    quiet: true
  tags: install

- name: Verify zip checksum matches SHA256SUMS
  ansible.builtin.command: >-
    sha256sum --ignore-missing -c
    {{ __vault_tmpdir }}/vault_{{ vault_version }}_SHA256SUMS
  args:
    chdir: "{{ __vault_tmpdir }}"
  changed_when: false
  tags: install

# --- Create vault system group and user (binary path only) --------------------

- name: Create vault system group
  ansible.builtin.group:
    name: "{{ vault_group }}"
    system: true
    state: present
  tags: install

- name: Create vault system user
  ansible.builtin.user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /sbin/nologin
    create_home: false
    home: /opt/vault
    state: present
  tags: install

# --- Extract binary -----------------------------------------------------------
# Idempotency: check existing binary version before extracting.

- name: Check current installed binary version
  ansible.builtin.command: "{{ vault_bin_path }} version"
  register: __vault_installed_version
  changed_when: false
  failed_when: false
  tags: install

- name: Extract Vault binary to /usr/local/bin
  ansible.builtin.unarchive:
    src: "{{ __vault_tmpdir }}/{{ __vault_zip_name }}"
    dest: /usr/local/bin
    remote_src: true
    include:
      - vault
    mode: "0755"
    owner: root
    group: root
  when: >-
    __vault_installed_version['rc'] != 0 or
    vault_version not in __vault_installed_version['stdout']
  notify:
    - reload systemd daemon
    - restart vault
  tags: install

# --- Clean up temp directory --------------------------------------------------

- name: Remove temporary download directory
  ansible.builtin.file:
    path: "{{ __vault_tmpdir }}"
    state: absent
  tags: install
